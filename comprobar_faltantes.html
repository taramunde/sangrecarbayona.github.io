<!DOCTYPE html>
<html>
<head>
    <title>Sincronizador Sangre Carbayona</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .box { background: #2d2d2d; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #005eb8; }
        textarea { width: 100%; height: 150px; background: #000; color: #0f0; border: 1px solid #444; font-family: monospace; }
        h3 { color: #005eb8; margin-top: 0; }
    </style>
</head>
<body>
    <h1>🕵️ Analizador de Jugadores Faltantes</h1>
    <div id="resultados">Cargando datos...</div>

    <script src="js/players-database.js"></script>
    <script src="js/player-data.js"></script>

    <script>
        window.onload = function() {
            // Clasificamos por las categorías que usas en player-data.js
            const faltantes = {
                "Porteros": "",
                "Defensas": "",
                "Centrocampistas": "",
                "Delanteros": "",
                "Entrenadores": ""
            };

            let totalFaltan = 0;

            for (let id in playersDatabase) {
                // Si el ID de la database NO existe en playersData, es que falta
                if (!playersData[id]) {
                    totalFaltan++;
                    const p = playersDatabase[id];
                    let cat = "Delanteros"; // Por defecto
                    
                    // Lógica para detectar categoría según el "alt" o la posición
                    const desc = p.alt.toLowerCase();
                    if (desc.includes("portero")) cat = "Porteros";
                    else if (desc.includes("defensa")) cat = "Defensas";
                    else if (desc.includes("centrocampista")) cat = "Centrocampistas";
                    else if (desc.includes("entrenador")) cat = "Entrenadores";

                    // Generamos el bloque con tu estructura de player-data.js
                    faltantes[cat] += `    ${id}: {
        name: "${p.name}",
        footballName: "${p.name}",
        position: "${p.alt}",
        role: "${cat === 'Entrenadores' ? 'entrenador' : 'jugador'}",
        image: "${p.src}",
        personalData: { birthPlace: "Pendiente", country: "España", height: "0,00 m", birthDate: "00/00/0000" },
        career: [{ season: "2024/25", team: "Real Oviedo", category: "2ª Div." }],
        stats: []
    },\n`;
                }
            }

            const resDiv = document.getElementById('resultados');
            resDiv.innerHTML = "";

            if (totalFaltan === 0) {
                resDiv.innerHTML = "<h2>✅ ¡Todo al día! No faltan jugadores.</h2>";
            } else {
                for (let seccion in faltantes) {
                    if (faltantes[seccion]) {
                        resDiv.innerHTML += `
                            <div class="box">
                                h3>${seccion} que te faltan por meter:</h3>
                                <p>Copia y pega esto dentro de la sección correspondiente en <b>player-data.js</b>:</p>
                                <textarea>${faltantes[seccion]}</textarea>
                            </div>`;
                    }
                }
            }
        };
    </script>
</body>
</html>
